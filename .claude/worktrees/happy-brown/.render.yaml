services:
  - type: web
    name: pregen-backend
    env: python
    plan: free
    root: services
    buildCommand: |
      pip install --upgrade pip
      pip install --only-binary=:all: -r requirements.txt
    startCommand: uvicorn gemini_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
