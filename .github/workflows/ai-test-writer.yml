name: AI Test Writer

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect changed files
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );
            core.setOutput("files", JSON.stringify(files.map((file) => ({
              filename: file.filename,
              status: file.status,
              additions: file.additions,
              deletions: file.deletions,
              changes: file.changes,
            }))));

      - name: Send PR to QA orchestrator
        env:
          FASTAPI_WEBHOOK_URL: ${{ secrets.FASTAPI_WEBHOOK_URL }}
          CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.files }}
          PR_CONTEXT: ${{ toJson(github.event.pull_request) }}
        run: |
          python - <<'PY'
          import json
          import os
          from urllib import request

          pull_request = json.loads(os.environ["PR_CONTEXT"])
          payload = {
              "pr_title": pull_request.get("title", ""),
              "pr_body": pull_request.get("body", ""),
              "diff_url": pull_request.get("diff_url", ""),
              "changed_files": json.loads(os.environ["CHANGED_FILES_JSON"]),
              "repo": pull_request.get("head", {}).get("repo", {}).get("full_name"),
              "branch": pull_request.get("head", {}).get("ref"),
              "commit": pull_request.get("head", {}).get("sha"),
          }

          endpoint = os.environ["FASTAPI_WEBHOOK_URL"].rstrip("/") + "/generate-tests"
          req = request.Request(
              endpoint,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with request.urlopen(req) as response:
              print(response.read().decode("utf-8"))
          PY
